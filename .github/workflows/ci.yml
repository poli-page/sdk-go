name: CI

on:
  push:
  pull_request:
    branches: [main]

# Restrict workflow permissions to the minimum needed. ci.yml never writes
# to the repo and never publishes anything; the only outbound write is the
# Codecov upload, which runs under a short-lived OIDC token (no repo secret).
permissions:
  contents: read

env:
  # Prevent any CI step from accidentally mutating go.sum / fetching a new
  # dep mid-build. Any new dependency must be added in a normal commit.
  GOFLAGS: -mod=readonly

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # id-token is needed by codecov/codecov-action so it can mint a short-lived
    # OIDC token instead of requiring a CODECOV_TOKEN secret on this public repo.
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: '1.25'
          - os: ubuntu-latest
            go-version: '1.26'
          - os: macos-latest
            go-version: '1.26'
          - os: windows-latest
            go-version: '1.26'
    steps:
      - name: Disable autocrlf
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go build ./...
          else
            echo "No go.mod yet — skipping build"
          fi

      - name: Vet
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go vet ./...
          else
            echo "No go.mod yet — skipping vet"
          fi

      - name: Format check
        shell: bash
        run: |
          if [ -f go.mod ]; then
            unformatted=$(gofmt -l .)
            if [ -n "$unformatted" ]; then
              echo "The following files are not gofmt-clean:"
              echo "$unformatted"
              exit 1
            fi
          fi

      - name: Lint
        shell: bash
        run: |
          if [ -f .golangci.yml ] && [ -f go.mod ]; then
            # Build from source with the matrix Go version so the binary's
            # Go floor matches the project's `go` directive (the prebuilt
            # release binaries are pinned to an older Go and refuse to lint
            # newer-targeted modules).
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
            "$(go env GOPATH)/bin/golangci-lint" run ./...
          else
            echo "No .golangci.yml yet — skipping lint"
          fi

      - name: govulncheck
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
            "$(go env GOPATH)/bin/govulncheck" ./...
          else
            echo "No go.mod yet — skipping govulncheck"
          fi

      - name: Test
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          else
            echo "No go.mod yet — skipping test"
          fi

      - name: Upload coverage to Codecov
        # Upload only from one matrix entry to avoid noisy duplicate reports.
        # `use_oidc: true` makes this tokenless on public repos — see the
        # job-level `id-token: write` permission above.
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26' && hashFiles('coverage.out') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: coverage.out
          fail_ci_if_error: false

      - name: Consumer-module install-smoke
        # Sanity check that a fresh downstream module can import the SDK
        # and build a trivial program against it. Catches packaging
        # regressions (broken go.mod, accidental internal/ exports,
        # circular imports across option ↔ polipage, etc.) that the
        # in-repo tests miss because they share the module.
        shell: bash
        run: |
          if [ ! -f go.mod ]; then
            echo "No go.mod yet — skipping smoke"
            exit 0
          fi
          SMOKE_DIR="$(mktemp -d)"
          cd "$SMOKE_DIR"
          cat > go.mod <<EOF
          module smoke

          go 1.25

          require github.com/poli-page/sdk-go v0.0.0-00010101000000-000000000000

          replace github.com/poli-page/sdk-go => $GITHUB_WORKSPACE
          EOF
          cat > main.go <<'EOF'
          package main

          import (
              "fmt"
              polipage "github.com/poli-page/sdk-go"
              "github.com/poli-page/sdk-go/option"
          )

          func main() {
              c := polipage.NewClient(option.WithAPIKey("pp_test_smoke"))
              _ = c
              fmt.Println("smoke: NewClient ok")
          }
          EOF
          # GOFLAGS=-mod=readonly is inherited from the workflow env, but the
          # smoke module's go.mod has no go.sum yet — relax just for this step.
          GOFLAGS= go mod tidy
          GOFLAGS= go build ./...
          GOFLAGS= go run .
