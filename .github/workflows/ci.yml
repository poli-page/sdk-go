name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go-version: '1.25'
          - os: ubuntu-latest
            go-version: '1.26'
          - os: macos-latest
            go-version: '1.26'
          - os: windows-latest
            go-version: '1.26'
    steps:
      - name: Disable autocrlf
        shell: bash
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go build ./...
          else
            echo "No go.mod yet — skipping build"
          fi

      - name: Vet
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go vet ./...
          else
            echo "No go.mod yet — skipping vet"
          fi

      - name: Format check
        shell: bash
        run: |
          if [ -f go.mod ]; then
            unformatted=$(gofmt -l .)
            if [ -n "$unformatted" ]; then
              echo "The following files are not gofmt-clean:"
              echo "$unformatted"
              exit 1
            fi
          fi

      - name: Lint
        shell: bash
        run: |
          if [ -f .golangci.yml ] && [ -f go.mod ]; then
            # Build from source with the matrix Go version so the binary's
            # Go floor matches the project's `go` directive (the prebuilt
            # release binaries are pinned to an older Go and refuse to lint
            # newer-targeted modules).
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
            "$(go env GOPATH)/bin/golangci-lint" run ./...
          else
            echo "No .golangci.yml yet — skipping lint"
          fi

      - name: Test
        shell: bash
        run: |
          if [ -f go.mod ]; then
            go test -v -race ./...
          else
            echo "No go.mod yet — skipping test"
          fi
