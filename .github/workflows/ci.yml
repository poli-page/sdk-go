name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23', '1.24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: |
          if [ -f go.mod ]; then
            go build ./...
          else
            echo "No go.mod yet — skipping build"
          fi

      - name: Vet
        run: |
          if [ -f go.mod ]; then
            go vet ./...
          else
            echo "No go.mod yet — skipping vet"
          fi

      - name: Format check
        run: |
          if [ -f go.mod ]; then
            unformatted=$(gofmt -l .)
            if [ -n "$unformatted" ]; then
              echo "The following files are not gofmt-clean:"
              echo "$unformatted"
              exit 1
            fi
          fi

      - name: Test
        run: |
          if [ -f go.mod ]; then
            go test -v -race ./...
          else
            echo "No go.mod yet — skipping test"
          fi
