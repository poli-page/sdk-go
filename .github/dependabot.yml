version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # The SDK currently has zero runtime deps (stdlib only). The group
    # below catches anything we add later, plus indirect deps from any
    # future dev tooling pulled into go.mod.
    groups:
      gomod:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"
